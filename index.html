<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instant Win Portfolio</title>

<style>
:root{
  --bg:#0b0e14;
  --panel:#121826;
  --accent:#00f0ff;
  --accent-soft:rgba(0,240,255,0.15);
  --text:#e6e9f0;
  --muted:#9aa3b2;
  --border:#1c2335;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
  background:linear-gradient(180deg,#070a10 0%,var(--bg) 40%);
  color:var(--text);
}

section{
  padding:80px 20px;
  max-width:1200px;
  margin:0 auto;
}

h1,h2,h3{margin:0 0 12px 0;letter-spacing:.3px}
h1{font-size:42px}
h2{font-size:28px}
h3{font-size:18px;min-height:44px}
p{margin:0 0 16px 0;color:var(--muted);line-height:1.6;min-height:52px}

/* HEADER */
.site-header{
  position:sticky;top:0;z-index:100;
  padding:18px 28px;
  background:linear-gradient(180deg,rgba(11,14,20,.95),rgba(11,14,20,.6));
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.brand-wrap{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;gap:14px;
}
.brand-logo{height:48px}

/* HERO */
.hero{padding-top:120px;text-align:center}
.hero p{max-width:720px;margin:0 auto 32px auto;min-height:auto}

/* BUTTONS */
.btn{
  padding:14px 22px;
  border-radius:8px;
  border:1px solid var(--accent);
  color:var(--accent);
  background:linear-gradient(180deg,rgba(0,240,255,.08),rgba(0,240,255,.02));
  text-decoration:none;
  font-weight:600;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  transition:all .2s ease;
}
.btn.primary{background:var(--accent);color:#000}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(0,0,0,.45);
}
.btn.download{
  background:var(--accent);
  color:#000;
  min-width:180px;
}

/* DETAIL ACTIONS ROW */
.detail-actions{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:24px;
}

.detail-actions-right{
  display:flex;
  align-items:center;
  gap:14px;
}

/* GAME ID BOX */
.game-id-box{
  padding:10px 16px;
  border-radius:8px;
  background:rgba(0,240,255,.08);
  border:1px solid rgba(0,240,255,.35);
  color:var(--accent);
  font-size:13px;
  letter-spacing:.08em;
  text-transform:uppercase;
  white-space:nowrap;
}
.game-id-box span{
  font-weight:700;
  margin-left:6px;
  color:#fff;
}

/* GAME DETAIL */
.game-detail{
  margin:120px auto;
  padding:40px;
  background:rgba(18,24,38,.85);
  border-radius:20px;
}
.game-images{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:24px;
  margin:40px 0;
}
.game-images img{
  width:100%;
  object-fit:contain;
  border-radius:16px;
  background:#0b1020;
}
@media(max-width:900px){
  .game-images{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- EXAMPLE GAME DETAIL WITH GAME ID -->
<section id="chain-reactor" class="game-detail">
  <h2>Chain Reactor</h2>

  <div class="detail-actions">
    <a href="#portfolio" class="btn">← Back to Portfolio</a>

    <div class="detail-actions-right">
      <div class="game-id-box">
        GAME ID:<span> TBD-001 </span>
      </div>
      <a class="btn download" href="./downloads/chain-reactor.zip" download>Download ZIP</a>
    </div>
  </div>

  <p>Explosive cascading multiplier gameplay with escalating volatility.</p>

  <div class="game-images">
    <img src="./chain-reactor-landscape.jpg">
    <img src="./chain-reactor-portrait.png">
  </div>
</section>

</body>
</html>
